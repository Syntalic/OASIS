    path: /person/search
    capabilities:
      - identity.person_search
  - origin: https://stabledomains.dev
    method: POST
    path: /api/check
    capabilities:
      - cloud.domains
  - origin: https://stabledomains.dev
    method: GET
    path: /api/domain/dns
    capabilities:
      - cloud.domains
  - origin: https://2s.io
    method: GET
    path: /api/geocode/address
    capabilities:
      - maps.geocode
