id: comms.send_email
label: Send an outbound email
description: Send a single email message via micropayment without API keys. Use when an agent must deliver one outbound email for notifications, confirmations, or replies without configuring SMTP or mail APIs.
aliases:
  - send email
  - email delivery
  - outbound email
  - send one-off email no API key
  - deliver message to inbox
  - outbound mail without SMTP
  - email a recipient directly
  - transactional email send
  - shoot an email to user
  - programmatic single email delivery
  - micropay to send email
consumes:
  - entity: Contact
    role: identifier
produces:
  - entity: Message
    role: payload
    format: email
facets:
  domain: comms
  action: send
  modality:
    - text
links:
  - type: sibling_of
    to: comms.send_fax
    note: same outbound-send family, differs by channel (email vs fax)
  - type: sibling_of
    to: comms.send_sms
    note: same outbound-send family, differs by channel (email vs SMS)
  - type: sibling_of
    to: comms.voice_call
    note: same outbound-send family, differs by channel (email vs voice call)
  - type: sibling_of
    to: comms.agent_inbox
    note: same comms family; agent_inbox provisions the mailbox these senders deliver from; was dangling related comms.buy_inbox