id: data.drug_label
label: Look up FDA drug labels and medication information
description: Regulatory drug-label lookup — FDA-approved indications, dosage, warnings, adverse reactions, and manufacturer details by brand or generic name. Use when an agent needs authoritative medication information, not open-web health articles (ai.web_research).
aliases:
  - FDA drug label lookup
  - openFDA drug label
  - medication label by generic name
  - prescription drug information API
  - drug indications and dosage lookup
  - adverse reactions drug label
  - pharmaceutical label search
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: StructuredRecord
    role: payload
facets:
  domain: data
  action: lookup
links:
  - type: sibling_of
    to: data.scientific_lookup
    note: drug_label is regulatory medication labels; scientific_lookup is broader research entities