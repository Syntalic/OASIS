id: comms.voice_call
label: Place an AI-powered phone call
description: Initiate an outbound AI phone call with natural-language task instructions. Use when an agent must place a real phone call to confirm appointments, follow up with customers, or complete spoken tasks autonomously.
aliases:
  - phone call
  - voice call
  - outbound call
  - ai call
  - confirm appointment
  - call a customer
  - call someone on the phone
  - automated outbound phone call
  - phone follow up for customer
  - voice agent makes a call
  - dial number and speak task
  - AI phone outreach
  - place call with instructions
  - telephony task via AI
consumes:
  - entity: Contact
    role: identifier
produces:
  - entity: Message
    role: payload
    format: voice
facets:
  domain: comms
  action: send
  modality:
    - audio
links:
  - type: sibling_of
    to: comms.agent_inbox
    note: same comms family; agent_inbox provisions a mailbox rather than placing a call
  - type: sibling_of
    to: ai.speech_to_text
    note: same audio family, differs by direction (place a call vs audio to text)
  - type: sibling_of
    to: ai.text_to_speech
    note: same audio family, differs by direction (place a call vs text to audio)