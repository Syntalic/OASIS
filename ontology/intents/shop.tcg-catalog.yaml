id: shop.tcg_catalog
label: Look up trading card game sets and cards
description: Trading card game catalog metadata — card sets, individual cards, bulk card lookups, and pricing across Pokemon, Magic, Yu-Gi-Oh, and other collectible card games. Use when an agent researches collectible card inventory, not general retail product deals (shop.find_deals).
aliases:
  - trading card game catalog
  - TCG card lookup
  - collectible card set metadata
  - Pokemon card set metadata
  - Magic The Gathering card lookup
  - Yu-Gi-Oh card database
  - trading card expansion lookup
  - collectible card database search
  - card game set catalog search
  - bulk TCG card metadata
  - collectible card game API
  - card set expansion lookup
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: Product
    role: payload
    cardinality: many
facets:
  domain: shop
  action: lookup
links:
  - type: sibling_of
    to: shop.find_deals
    note: tcg_catalog is collectible card metadata; find_deals is discounted retail products