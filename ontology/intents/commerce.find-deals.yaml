id: commerce.find_deals
label: Find discounted products in a category
description: Discover current deals and discounts within a product category. Use when an agent needs to surface discounted or on-sale items under a budget for shopping recommendations or deal scouting.
aliases:
  - deal finder
  - discounts
  - on sale
  - kitchen appliances
  - electronics deals
  - discounted products
  - discounted electronics
  - deals under budget
  - surface sale items
  - find products on clearance
  - what's on sale in category
  - bargain hunt by category
  - sale items under price limit
  - current markdowns in retail
consumes:
  - entity: ProductCategory
    role: identifier
  - entity: Money
    role: constraint
produces:
  - entity: PriceSignal
    role: payload
    cardinality: many
facets:
  domain: commerce
  action: search
  freshness: realtime
links:
  - type: sibling_of
    to: commerce.price_drop_alert
    note: same pricing-intel family, differs by purpose (surface category deals vs monitor one SKU for drops)