id: blockchain.token_balance
label: Look up wallet token balances
description: On-chain token and wallet balance lookups across EVM and non-EVM chains. Use when an agent needs ERC-20 holdings, multi-chain portfolio value in USD, or wallet inventory before transfers, portfolio checks, or treasury reporting.
aliases:
  - ERC-1155 balance
  - wallet holdings
  - token balance lookup
  - how many tokens wallet holds
  - wallet token balance
  - check wallet holdings on chain
  - what tokens does this wallet hold
  - on-chain balance lookup
  - ERC-20 token balance
  - wallet portfolio value in USD
  - multi-chain wallet balances
  - how much USDC does this wallet hold
consumes:
  - entity: WalletAddress
    role: identifier
produces:
  - entity: Answer
    role: payload
    format: json
facets:
  domain: blockchain
  action: lookup
  freshness: realtime
links:
  - type: sibling_of
    to: blockchain.onchain_analytics
    note: same crypto wallet family, differs by action (read holdings vs analyze flows)
  - type: sibling_of
    to: blockchain.rpc
    note: same on-chain family, differs by action (read balance vs execute JSON-RPC)