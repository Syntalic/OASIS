id: compute.convert_units
label: Convert units, measurements, and encodings
description: Transform numeric values between measurement units, data-size units, time units, timezone offsets, encodings, and lightweight dev utilities (hash, HMAC, Base64, JWT decode). Use when an agent normalizes quantities or encodings (centimeters to inches, gigabytes to bytes, hex to decimal, SHA-256 hash) — not currency exchange (finance.exchange_rates), financial calculators (compute.financial_calculator), or natural-language translation (ai.translate_text).
aliases:
  - unit conversion
  - convert measurement units
  - cm to inches conversion
  - GB to bytes converter
  - convert data size units
  - hex to decimal conversion
  - binary encoding conversion
  - convert time units
  - timezone time conversion
  - minutes to hours converter
  - length weight volume conversion
  - furlongs to meters
  - SHA-256 hash API
  - HMAC compute API
  - Base64 encode decode
  - JWT decode utility
  - slugify text utility
  - cron next run time
  - date difference calculator
  - duration conversion utility
  - URL encode decode utility
  - TOTP code generator
  - regex test utility
  - user agent parser
  - case convert text utility
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: Answer
    role: payload
facets:
  domain: compute
  action: transform
links:
  - type: sibling_of
    to: finance.exchange_rates
    note: convert_units is physical, data-size, and time units; exchange_rates is currency pairs