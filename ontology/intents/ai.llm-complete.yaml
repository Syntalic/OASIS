id: ai.llm_complete
label: LLM text completion or chat
description: Paid chat or completion APIs for general-purpose language models. Use when an agent needs generative text, reasoning, or tool-use responses from a language model — not task-specific text tools like document extraction (ai.document_extract), translation (ai.translate_text), or embeddings (ai.embeddings).
aliases:
  - chat completion
  - LLM API
  - LLM text completion
  - chat completion API
  - text generation API
  - model chat endpoint
  - generative text response
  - run a language model prompt
  - chat with a hosted language model
  - general-purpose completion endpoint
  - rewrite or rephrase this text
  - paraphrase or reword a paragraph
  - make this writing more formal or polished
  - summarize or edit a passage of text
consumes:
  - { entity: Text, role: identifier }
produces:
  - { entity: Text, role: payload }

facets:
  domain: ai
  action: generate
