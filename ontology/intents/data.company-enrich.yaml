id: data.company_enrich
label: Enrich company data from a domain
description: Look up company firmographics, industry, and metadata from a domain name. Use when an agent needs business context from a website domain for prospecting, due diligence, or CRM enrichment.
aliases:
  - company enrichment
  - enrich company
  - company from domain
  - enrich a company
  - domain lookup company
  - who runs stripe.com
  - firmographics from domain
  - company metadata from domain
  - lookup company by website
  - enrich lead from domain name
  - business info from URL
  - company profile from domain
  - what company owns this domain
consumes:
  - entity: Domain
    role: identifier
produces:
  - entity: Company
    role: payload
facets:
  domain: data
  action: lookup
links:
  - type: sibling_of
    to: media.social_data
    note: same identity family, differs by entity x purpose (Company firmographics vs social posts)
  - type: sibling_of
    to: data.whois_lookup
    note: same domain family, differs by purpose (enrich the owning company vs read DNS/WHOIS)
  - type: sibling_of
    to: cloud.domains
    note: same domain family, differs by action (enrich vs register/provision)