id: social.social_data
label: Fetch social media posts and comments
description: Retrieve profiles, posts, comments, and engagement from major social platforms. Use when an agent monitors brand sentiment, analyzes creator content, or pulls thread data for research — not e-commerce product or marketplace listings (commerce).
aliases:
  - social media data
  - fetch post comments
  - instagram comments API
  - facebook post comments
  - tiktok post data
  - reddit thread content
  - reddit hot posts subreddit feed
  - reddit trending posts
  - fetch reddit subreddit posts
  - reddit post comments thread
  - X user timeline posts
  - Twitter user timeline API
  - X Community Notes lookup
  - TikTok scraper posts and hashtags
  - youtube video comments
  - Facebook ad library details
  - social listening API
  - creator content lookup
  - sentiment from social posts
consumes:
  - entity: Company
    role: identifier
  - entity: Person
    role: identifier
  - entity: Topic
    role: identifier
produces:
  - entity: SocialProfile
    role: payload
    format: json
    cardinality: many
facets:
  domain: social
  action: lookup