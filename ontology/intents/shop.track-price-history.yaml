id: shop.track_price_history
label: Get historical price trends for a product
description: Retrieve price history over time for a specific product query. Use when an agent needs historical pricing trends to judge buy timing, volatility, or whether an item was cheaper before.
aliases:
  - price history
  - price trend
  - historical pricing
  - how has price changed over time
  - price chart for product
  - historical cost trend SKU
  - past pricing for item
  - price over last months
  - track product price timeline
  - was it cheaper before
  - pricing history lookup
consumes:
  - entity: Product
    role: identifier
produces:
  - entity: PriceSignal
    role: payload
    cardinality: many
facets:
  domain: shop
  action: lookup
  freshness: historical
links:
  - type: sibling_of
    to: shop.inflation_tracker
    note: same pricing-intel family, differs by entity granularity (one Product vs a ProductCategory), both historical