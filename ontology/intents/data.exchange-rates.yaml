id: data.exchange_rates
label: Convert and look up currency exchange rates
description: Live and historical foreign exchange rates between currency pairs. Use when an agent converts amounts, quotes FX rates, or normalizes multi-currency financial data.
aliases:
  - exchange rates
  - currency conversion
  - FX rate lookup
  - convert USD to EUR
  - live forex rates
  - historical exchange rate
  - currency converter API
  - foreign exchange API
  - get rate between currencies
consumes:
  - entity: Currency
    role: identifier
    cardinality: many
produces:
  - entity: MarketQuote
    role: payload
facets:
  domain: data
  action: lookup
  freshness: realtime