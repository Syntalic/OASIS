id: compute.blockchain_rpc
label: Call blockchain JSON-RPC
description: Execute JSON-RPC calls (eth_call, eth_getBalance, getBlock, and similar methods) against blockchain networks via pay-per-request RPC. Use when an agent submits JSON-RPC methods or reads raw on-chain state without running its own node — not for crypto prices (finance.crypto_spot_price) or wallet token balances (finance.token_balance).
aliases:
  - json-rpc
  - node rpc
  - blockchain node access
  - solana json-rpc
  - ethereum mainnet json rpc
  - eth mainnet rpc
  - solana rpc
  - ethereum rpc
  - eth_getBalance via json-rpc
  - eth_call without running a node
  - submit a json-rpc method to a chain
  - read raw on-chain state via json-rpc
consumes:
  - entity: BlockchainNetwork
    role: identifier
produces:
  - entity: StructuredRecord
    role: payload
    format: json
facets:
  domain: compute
  action: execute
  freshness: realtime
