id: ai.document_extract
label: Extract structured data from documents
description: OCR, PDF parsing, table extraction, and schema-based field extraction from uploaded files. Use when an agent needs to turn invoices, scans, or spreadsheets into structured JSON without running a local OCR pipeline.
aliases:
  - document OCR
  - PDF invoice extraction
  - scanned PDF fields
  - table extraction from files
  - structured document parsing
  - pull fields from PDF invoice
  - document OCR and table extraction
  - parse uploaded PDF
  - extract data from scanned document
consumes:
  - entity: Document
    role: identifier
produces:
  - entity: StructuredRecord
    role: payload
    format: json
facets:
  domain: ai
  action: extract
  modality:
    - json
links:
  - type: broader_of
    to: data.ocr
    note: document_extract parses full documents into structured fields; OCR is the narrower pixels-to-text variant