id: devtools.generate_secret
label: Generate UUIDs, tokens, passwords, and random values
description: Mint fresh identifiers and secrets — UUID, ULID, GUID, nanoid, random strings, random bytes, random integers, secure passwords and passphrases, and API keys or tokens. Use when an agent needs a newly generated value, not encoding or unit conversion (compute.convert_units), and not password strength or breach checks.
aliases:
  - generate a UUID
  - uuid v4 generator
  - generate a ULID
  - random string generator
  - generate a secure password
  - password generator API
  - passphrase generator
  - random bytes generator
  - random integer in a range
  - generate an API key
  - create a random token
  - secure random value
  - nanoid generator
  - mint a unique identifier
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: Answer
    role: payload
    format: json
facets:
  domain: devtools
  action: generate
links:
  - type: sibling_of
    to: compute.convert_units
    note: generate_secret mints new random ids and secrets; convert_units transforms existing values between units and encodings
