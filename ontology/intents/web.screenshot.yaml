id: web.screenshot
label: Capture a website screenshot
description: Take a full-page or viewport screenshot of any public URL via micropayment. Use when an agent needs a pixel-accurate visual capture of a public webpage for QA, archiving, or showing users what a site looks like.
aliases:
  - screenshot
  - website screenshot
  - page capture
  - take a screenshot
  - capture website
  - PNG of homepage
  - visual snapshot of webpage
  - grab screenshot of URL
  - capture page as image
  - screenshot a live URL
  - full page PNG capture
  - webpage image preview
  - render site as screenshot
consumes:
  - entity: Webpage
    role: identifier
produces:
  - entity: Image
    role: payload
    format: png
facets:
  domain: web
  action: extract
  modality:
    - image
links:
  - type: sibling_of
    to: web.markdown_extract
    note: same fetch-a-URL family, different output modality (PNG vs markdown), not substitutable
  - type: sibling_of
    to: web.scrape
    note: same fetch-a-URL family, different output modality (PNG vs HTML), not substitutable