id: finance.stock_quote
label: Look up stock price quotes and market data
description: Current and recent equity quotes, prices, and trading metadata by ticker symbol. Use when an agent answers stock price questions, monitors portfolios, or grounds financial analysis in live market data.
aliases:
  - stock price
  - stock quote
  - share price lookup
  - what is AAPL trading at
  - equity quote API
  - ticker price now
  - market quote by symbol
  - real time stock price
  - get quote for ticker
consumes:
  - entity: Ticker
    role: identifier
produces:
  - entity: MarketQuote
    role: payload
facets:
  domain: finance
  action: lookup
  freshness: realtime
links:
  - type: sibling_of
    to: data.exchange_rates
    note: same lookup-a-live-quote family, differs only by entity (Ticker vs Currency)