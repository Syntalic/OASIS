id: social.influencer_search
label: Find social media influencers by niche
description: Search creator and influencer profiles by niche, location, follower count, and engagement for marketing campaigns. Use when an agent needs creator discovery filtered by audience, niche, or geography for outreach or campaign planning.
aliases:
  - social media influencer search
  - influencer search
  - creator search
  - fitness influencers
  - find influencers
  - creators in fitness niche
  - creator accounts by follower count
  - micro influencers by city
  - search creators for brand campaign
  - influencer discovery by platform
  - find creators by engagement rate
  - marketing influencers by location
  - niche creator profile search
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: SocialProfile
    role: payload
    cardinality: many
facets:
  domain: social
  action: search
links:
  - type: sibling_of
    to: data.company_enrich
    note: same identity-lookup family, differs by entity (SocialProfile vs Company)
  - type: sibling_of
    to: media.social_data
    note: same social family, differs by purpose (discover creators vs fetch their posts)