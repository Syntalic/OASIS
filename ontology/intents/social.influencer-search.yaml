id: social.influencer_search
label: Find social media influencers by niche
description: Search Instagram, TikTok, and YouTube creator profiles by niche, location, follower count, and engagement for marketing campaigns. Use when an agent needs creator discovery filtered by audience, niche, or geography for outreach or campaign planning.
aliases:
  - instagram influencer
  - influencer search
  - creator search
  - fitness influencers
  - find influencers
  - creators in fitness niche
  - instagram accounts by follower count
  - micro influencers by city
  - search creators for brand campaign
  - find creators by engagement rate
  - marketing influencers by location
  - tiktok creators by follower count
  - youtube creators by subscriber count
  - find creators across instagram tiktok youtube
consumes:
  - entity: Topic
    role: identifier
produces:
  - entity: SocialProfile
    role: payload
    cardinality: many
facets:
  domain: social
  action: search
links:
  - type: sibling_of
    to: identity.company_enrich
    note: same identity-lookup family, differs by entity (SocialProfile vs Company)
  - type: sibling_of
    to: social.social_data
    note: same social family, differs by purpose (discover creators vs fetch their posts)