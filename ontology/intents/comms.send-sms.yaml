id: comms.send_sms
label: Send an SMS text message
description: Outbound SMS for alerts, reminders, and one-time verification codes. Use when an agent must text a phone number without provisioning Twilio or carrier contracts.
aliases:
  - SMS verification code
  - one-time text message
  - outbound SMS
  - text a phone number
  - send SMS alert
  - text message verification
  - SMS to mobile number
  - programmatic text message
  - send text without Twilio
consumes:
  - entity: Contact
    role: identifier
produces:
  - entity: Message
    role: payload
    format: sms
facets:
  domain: comms
  action: send
  modality:
    - text
links:
  - type: sibling_of
    to: comms.voice_call
    note: same outbound-send family, differs by channel (SMS vs voice call)
  - type: sibling_of
    to: comms.agent_inbox
    note: same comms family; agent_inbox provisions a mailbox rather than sending