id: blockchain.onchain_analytics
label: Track on-chain smart money and wallet analytics
description: On-chain analytics for smart-money flows, wallet profiling, token holder metrics, and fund movements. Use when an agent researches crypto wallets, token accumulation, or labeled on-chain activity, not protocol/market aggregates (blockchain.defi_analytics) or network gas and health telemetry (blockchain.network_metrics).
aliases:
  - smart money tracking
  - on-chain wallet analytics
  - token holder flows
  - wallet profiling on chain
  - fund flow analytics
  - labeled wallet activity
  - what wallets are accumulating
  - on-chain signal discovery
  - crypto wallet intelligence
  - on-chain fund flow dashboard
  - whale wallet tracker
  - smart money leaderboard
  - wallet profit and loss (PnL)
  - token holder concentration
consumes:
  - entity: WalletAddress
    role: identifier
produces:
  - entity: Answer
    role: payload
    format: json
facets:
  domain: blockchain
  action: analyze
  freshness: recent
links:
  - type: sibling_of
    to: blockchain.rpc
    note: same on-chain family, differs by action (analyze flows vs execute JSON-RPC)