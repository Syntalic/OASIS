id: analyst.inflation_tracker
label: Track category price inflation trends
description: Analyze price inflation and trend direction within a retail category. Use when an agent needs category-level inflation trends to explain rising costs, budget impacts, or year-over-year price changes.
aliases:
  - inflation
  - price inflation
  - category trends
  - grocery prices increased
  - how much have prices increased
  - grocery prices inflate
  - CPI category trend
  - price inflation year over year
  - how fast are prices rising
  - category price change over time
  - inflation trend in groceries
  - yoy price increase by category
  - are household goods getting more expensive
consumes:
  - entity: ProductCategory
    role: identifier
produces:
  - entity: PriceSignal
    role: payload
    cardinality: many
facets:
  domain: analyst
  action: analyze
  freshness: historical
links:
  - type: sibling_of
    to: marketing.competitive_landscape
    note: same category pricing-intel family, differs by purpose (inflation trend vs competitive scan); repoints dangling related analyst.price_dispersion