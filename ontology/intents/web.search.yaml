id: web.search
label: Search the web for organic results
description: Real-time web search returning organic links, snippets, knowledge panels, and related queries. Use when an agent needs current SERP results, source URLs, or quick fact-finding across the open web.
aliases:
  - web search
  - organic web search results
  - search the internet
  - find sources online
  - organic search results
  - SERP lookup
  - web search query
  - live web results
  - people also ask search
  - general web search engine results
  - recent product announcements search
  - organic SERP results
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: SearchResults
    role: payload
    cardinality: many
  - entity: Webpage
    role: payload
    cardinality: many
facets:
  domain: web
  action: search
  modality:
    - json
  freshness: realtime
links:
  - type: broader_of
    to: ai.web_research
    note: web.search returns raw SERP links; web_research is the narrower cited-answer variant over the same query
  - type: pipes_to
    to: web.scrape
    note: search the web, then fetch/scrape the result URLs