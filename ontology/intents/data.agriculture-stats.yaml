id: data.agriculture_stats
label: Look up US agricultural statistics
description: Official US agricultural statistics — crop production, yields, prices, and county or state-level farm data from government sources. Use when an agent needs authoritative agriculture figures, not general civic address data (data.gov_civic).
aliases:
  - US agricultural statistics lookup
  - US agricultural production statistics
  - crop yield data by county
  - farm commodity statistics API
  - agriculture census data lookup
  - national agricultural stats API
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: EconomicIndicator
    role: payload
    cardinality: many
facets:
  domain: data
  action: lookup
links:
  - type: sibling_of
    to: data.gov_civic
    note: agriculture_stats is farm commodity data; gov_civic is legislative and civic address enrichment