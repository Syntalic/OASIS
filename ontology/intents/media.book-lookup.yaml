id: media.book_lookup
label: Search book metadata and bibliographic records
description: Book and publication metadata lookup by title, author, ISBN, or free-text query — bibliographic details, editions, and library catalog records. Use when an agent resolves book identity or enriches reading lists, not general web page scraping (web.scrape).
aliases:
  - book metadata search
  - public library catalog book lookup
  - search books by title and author
  - ISBN book lookup
  - bibliographic record search
  - publication metadata API
  - book catalog lookup
  - find book by author
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: Answer
    role: payload
    cardinality: many
facets:
  domain: media
  action: lookup