id: commerce.compare_price
label: Compare retail price across stores
description: Find the lowest current price for a product across multiple retailers. Use when an agent must compare the same SKU across stores before recommending where a user should buy.
aliases:
  - cheapest price
  - best price
  - price comparison
  - compare prices
  - cheapest airpods
  - lowest price
  - cross retailer price
  - where can I buy
  - buy cheaper
  - cheaper at Amazon or Walmart
  - cross-store price comparison
  - which store has lower price
  - best deal across retailers
  - price check multiple stores
  - compare same product different shops
  - who sells it cheapest today
  - multi-retailer price lookup
consumes:
  - entity: Product
    role: identifier
produces:
  - entity: PriceSignal
    role: payload
    cardinality: many
facets:
  domain: commerce
  action: compare
  freshness: realtime
links:
  - type: sibling_of
    to: commerce.find_deals
    note: same pricing-intel family, differs by entity granularity (one Product vs a ProductCategory)
  - type: sibling_of
    to: commerce.track_price_history
    note: same pricing-intel family, differs by time axis (current lowest vs historical trend)