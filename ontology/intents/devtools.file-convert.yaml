id: devtools.file_convert
label: Convert files between data formats
description: Convert documents and data files between formats — JSON to YAML, XML to JSON, CSV to JSON, XML or Markdown to DOCX or Word, Excel to CSV, and image transcoding between PNG, JPG, WebP, and AVIF. Use when an agent changes a file's format or serialization, not numeric or unit conversion (compute.convert_units) and not PDF-only edits (devtools.pdf_manipulate).
aliases:
  - convert JSON to YAML
  - yaml to json converter
  - convert XML to JSON
  - csv to json
  - json to csv
  - convert xml to word document
  - excel to csv
  - convert image format
  - png to webp
  - convert file format
  - data format converter
  - transcode an image
consumes:
  - entity: Document
    role: identifier
produces:
  - entity: Document
    role: payload
facets:
  domain: devtools
  action: transform
links:
  - type: sibling_of
    to: compute.convert_units
    note: file_convert changes a file's data format or serialization; convert_units converts numeric quantities, units, and encodings
  - type: sibling_of
    to: devtools.pdf_manipulate
    note: file_convert converts between file formats; pdf_manipulate edits PDF documents such as watermark, compress, merge, and split
