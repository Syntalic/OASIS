id: finance.prediction_markets
label: Browse prediction and event markets
description: Query prediction and event markets — list markets, event outcomes, current odds and outcome prices, and resolution status. Use when an agent wants the market-implied probability or price of a real-world event outcome — not crypto spot prices (finance.crypto_spot_price), equity quotes (finance.stock_quote), or wallet flows (finance.onchain_analytics).
aliases:
  - prediction markets
  - event markets
  - market-implied probability of an event
  - event market outcome prices
  - betting market odds API
  - what are the odds on this outcome
  - browse prediction market events
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: PredictionMarket
    role: payload
    cardinality: many
facets:
  domain: finance
  action: lookup
links:
  - type: sibling_of
    to: finance.trading_signals
    note: both speculative-market data, not substitutable — prediction markets price event outcomes, trading signals call entries/exits on assets
