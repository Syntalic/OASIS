id: ai.speech_to_text
label: Transcribe audio to text
description: Speech-to-text transcription via paid API. Use when an agent converts voice recordings, calls, or audio files into searchable text without hosting your own speech-to-text infrastructure.
aliases:
  - speech to text
  - transcribe audio
  - STT API
  - audio transcription API
  - audio to text
  - voice transcription
  - convert recording to text
  - transcribe voice memo
  - speech recognition API
consumes:
  - entity: AudioClip
    role: identifier
produces:
  - entity: Text
    role: payload
    format: text
facets:
  domain: ai
  action: transform
  modality:
    - text
links:
  - type: sibling_of
    to: ai.text_to_speech
    note: same audio family, inverse direction (audio to text vs text to audio), not substitutable
  - type: pipes_to
    to: ai.translate_text
    note: transcribe audio, then translate the transcript
  - type: pipes_to
    to: ai.embeddings
    note: transcribe audio, then embed the transcript for retrieval