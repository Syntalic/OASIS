id: comms.send_fax
label: Send a fax via micropayment
description: Outbound fax delivery priced per page. Use when an agent must transmit documents to a fax number for legal, healthcare, or legacy business workflows without a fax machine or carrier contract.
aliases:
  - send fax
  - fax per page
  - agent fax
  - transmit document by fax
  - fax a PDF to a number
  - outbound fax API
  - send pages to fax line
  - programmatic fax delivery
  - fax without a phone line
consumes:
  - entity: Contact
    role: identifier
produces:
  - entity: Message
    role: payload
    format: fax
facets:
  domain: comms
  action: send
  modality:
    - image
links:
  - type: sibling_of
    to: comms.send_sms
    note: same outbound-send family, differs by channel (fax vs SMS)
  - type: sibling_of
    to: comms.voice_call
    note: same outbound-send family, differs by channel (fax vs voice call)
  - type: sibling_of
    to: comms.agent_inbox
    note: same comms family; agent_inbox provisions a mailbox rather than sending