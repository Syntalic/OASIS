id: finance.token_balance
label: Look up wallet token balances
description: On-chain token and wallet balance lookups for EVM wallets. Use when an agent needs holdings, ERC-1155 balances, or wallet inventory before transfers, portfolio checks, or treasury reporting.
aliases:
  - ERC-1155 balance
  - wallet holdings
  - token balance lookup
  - how many tokens wallet holds
  - wallet token balance
  - check wallet holdings on chain
  - ERC1155 token count
  - what tokens does this wallet hold
  - on-chain balance lookup
consumes:
  - entity: WalletAddress
    role: identifier
produces:
  - entity: MarketQuote
    role: payload
    format: json
facets:
  domain: finance
  action: lookup
  freshness: realtime
links:
  - type: sibling_of
    to: blockchain.onchain_analytics
    note: same crypto wallet family, differs by action (read holdings vs analyze flows)
  - type: sibling_of
    to: blockchain.rpc
    note: same on-chain family, differs by action (read balance vs execute JSON-RPC)