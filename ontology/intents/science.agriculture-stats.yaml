id: science.agriculture_stats
label: Look up US agricultural statistics
description: USDA and NASS agricultural statistics — crop production, yields, prices, and county or state-level farm data from official government sources. Use when an agent needs authoritative US agriculture figures, not general civic address data (gov.civic).
aliases:
  - US agricultural statistics lookup
  - USDA NASS QuickStats lookup
  - US agricultural production statistics
  - crop yield data by county
  - farm commodity statistics API
  - agriculture census data lookup
  - national agricultural stats API
  - NASS agricultural stats API
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: EconomicIndicator
    role: payload
    cardinality: many
facets:
  domain: science
  action: lookup
links:
  - type: sibling_of
    to: gov.civic
    note: agriculture_stats is USDA farm commodity data; gov_civic is legislative and civic address enrichment