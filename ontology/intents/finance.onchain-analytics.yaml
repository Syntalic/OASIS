id: finance.onchain_analytics
label: Track on-chain smart money and wallet analytics
description: On-chain analytics for smart-money flows, wallet profiling, token holder metrics, and fund movements. Use when an agent researches crypto wallets, token accumulation, or labeled on-chain activity.
aliases:
  - smart money tracking
  - on-chain wallet analytics
  - token holder flows
  - wallet profiling on chain
  - fund flow analytics
  - labeled wallet activity
  - what wallets are accumulating
  - on-chain signal discovery
  - crypto wallet intelligence
consumes:
  - entity: WalletAddress
    role: identifier
produces:
  - entity: StructuredRecord
    role: payload
    format: json
facets:
  domain: finance
  action: analyze
  freshness: recent
links:
  - type: sibling_of
    to: compute.blockchain_rpc
    note: same on-chain family, differs by action (analyze flows vs execute JSON-RPC)