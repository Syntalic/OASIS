id: finance.crypto_market_intel
label: Get crypto market intelligence and sentiment
description: Crypto market intelligence beyond a single quote — trending altcoins, market sentiment and momentum, trade history, and cross-chain token context. Use when an agent monitors market narrative or portfolio activity, not raw protocol TVL (blockchain.defi_analytics) or actionable trade signals (finance.trading_signals).
aliases:
  - trending altcoins list
  - crypto trade history lookup
  - crypto transaction history API
  - altcoin trending scanner
  - crypto market sentiment
  - crypto market overview
  - trending crypto tokens
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: MarketQuote
    role: payload
    cardinality: many
facets:
  domain: finance
  action: lookup
  freshness: realtime
links:
  - type: sibling_of
    to: finance.crypto_spot_price
    note: crypto_market_intel is contextual market activity; crypto_spot_price is a point-in-time quote
  - type: sibling_of
    to: finance.trading_signals
    note: crypto_market_intel is intelligence feeds; trading_signals are explicit buy/sell calls