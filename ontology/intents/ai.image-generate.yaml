id: ai.image_generate
label: Generate an image from a text prompt
description: Text-to-image generation via AI models. Use when an agent must render a NEW visual asset from a natural-language prompt for mockups, illustrations, or user-facing content — not image analysis, captioning, moderation, or editing, which read an existing image and return text or a modified image.
aliases:
  - generate image
  - text to image
  - image from prompt
  - ai image generation
  - fast text to image
  - text to image generation
  - render a picture from prompt
  - create image from description
  - generate picture from text
  - make an illustration from prompt
  - draw an image from words
  - AI render from text prompt
consumes:
  - { entity: Text, role: identifier }
produces:
  - { entity: Image, role: payload, format: png }

facets:
  domain: ai
  action: generate
