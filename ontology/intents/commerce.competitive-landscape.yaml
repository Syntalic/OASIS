id: commerce.competitive_landscape
label: Competitive pricing landscape for a category
description: View all products in a category with competitive pricing across retailers. Use when an agent needs a category-wide market scan for competitive positioning, pricing research, or shelf analysis — not company-level competitor/business analysis (identity.company_enrich).
aliases:
  - competitive analysis
  - category landscape
  - market landscape
  - products and prices in category
  - retail competitive map
  - category pricing overview
  - market pricing for product type
  - all brands in category prices
  - competitive shelf pricing
  - category market scan
  - who competes in this product space
consumes:
  - entity: ProductCategory
    role: identifier
produces:
  - entity: PriceSignal
    role: payload
    cardinality: many
facets:
  domain: commerce
  action: analyze
  freshness: realtime
links:
  - type: sibling_of
    to: commerce.compare_price
    note: same pricing-intel family, differs by entity granularity (ProductCategory scan vs one Product comparison)
  - type: sibling_of
    to: commerce.find_deals
    note: same category pricing-intel family, differs by purpose (competitive scan vs deal surfacing)