id: commerce.price_drop_alert
label: Detect recent price drops on a product
description: Check whether a product's price has dropped recently across tracked retailers. Use when an agent needs to detect recent markdowns on a tracked SKU before alerting a user to buy.
aliases:
  - price drop
  - price alert
  - price decrease
  - did price go down recently
  - recent markdown on product
  - price decrease alert
  - has this item gotten cheaper
  - detect sale on tracked SKU
  - product price fell lately
  - notify if price dropped
  - check for recent price cuts
consumes:
  - entity: Product
    role: identifier
produces:
  - entity: PriceSignal
    role: payload
    cardinality: many
facets:
  domain: commerce
  action: monitor
  freshness: recent
links:
  - type: sibling_of
    to: commerce.compare_price
    note: same pricing-intel family, differs by action (monitor for drops vs compare current prices)
  - type: sibling_of
    to: commerce.track_price_history
    note: same pricing-intel family, differs by time axis (recent drop vs full history)