id: utility.iban_validate
label: Validate IBAN bank account numbers
description: IBAN format and checksum (MOD-97) validation for international bank account numbers. Use when an agent verifies payment rails before transfers, not live account existence, account-holder, or BIC/SWIFT verification.
aliases:
  - IBAN validation
  - validate IBAN number
  - international bank account validation
  - IBAN checksum check API
  - verify IBAN format
  - validate bank account number
  - check if IBAN is valid
consumes:
  - entity: Query
    role: identifier
produces:
  - entity: Answer
    role: payload
facets:
  domain: utility
  action: validate