name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:ts
      # Fast, index-free unit tests. The retrieval-quality benchmarks
      # (discovery/compare/resolve/curated-search) need the full built index,
      # which is not committed; run them locally via `pnpm test` after a build.
      - run: pnpm run test:unit
      # Gate every contributed task intent against the controlled taxonomy (schema,
      # facet/entity vocab, link targets). Same validator the curator tool + MCP use.
      - run: node dist/cli.js validate-source
      # Gate authored endpoint→capability bindings (schema + capability ids in the taxonomy).
      - run: node dist/cli.js validate-binding
      # Smoke-test the build -> validate -> search pipeline OFFLINE from a fixture
      # (no catalog crawl), so CI stays fast and deterministic.
      - run: node dist/cli.js build --openapi fixtures/minimal.openapi.json --origin https://api.example.com --no-x402scan --no-mppscan --skip-pay-skills -o /tmp/capindex-dist
      - run: node dist/cli.js validate -d /tmp/capindex-dist
      - run: node dist/cli.js search "demo" -d /tmp/capindex-dist